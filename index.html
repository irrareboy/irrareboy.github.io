<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRRAREBOY // Space Upgrade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    body {
      margin: 0;
      padding: 40px 20px;
      /* Эффект глубокого градиента тай-дай / aurora со скриншота */
      background: #b14833;
      background-image: 
        radial-gradient(at 0% 0%, #4fac9b 0px, transparent 50%),
        radial-gradient(at 100% 0%, #d96b43 0px, transparent 50%),
        radial-gradient(at 50% 100%, #e88d67 0px, transparent 50%);
      background-attachment: fixed;
      font-family: 'Space Grotesk', sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    /* Шапка профиля */
    .header {
      text-align: center;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* --- МАГИЯ 3D POP-OUT АВАТАРКИ --- */
    .avatar-wrapper {
      position: relative;
      width: 130px;
      height: 150px; /* Чуть выше, чтобы голове было куда "вылезать" */
      margin-bottom: 10px;
    }

    /* Задний круг-основа */
    .avatar-bg {
      position: absolute;
      bottom: 0;
      left: 5px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      z-index: 1;
    }

    /* Контейнер для фото с обрезкой нижней части */
    .avatar-cutout {
      position: absolute;
      bottom: 0;
      left: 5px;
      width: 120px;
      height: 140px; /* Высота больше круга */
      border-radius: 0 0 60px 60px; /* Скругление только снизу */
      overflow: hidden;
      z-index: 2;
    }

    /* Фото персонажа БЕЗ ФОНА (PNG) */
    .avatar-img {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 120px;
      height: 140px;
      object-fit: cover;
      /* Плавный интерактивный эффект при наведении на шапку */
      transition: transform 0.3s ease;
      transform-origin: bottom center;
    }

    /* При наведении голова слегка приподнимается еще выше */
    .header:hover .avatar-img {
      transform: scale(1.05);
    }
    /* --------------------------------- */

    .header h1 {
      font-family: 'VT323', monospace;
      font-size: 52px;
      line-height: 1;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ffffff;
      margin: 10px 0 8px 0;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }

    .header h1::after {
      content: "●";
      color: #ff3b30;
      font-size: 24px;
      margin-left: 4px;
      vertical-align: super;
    }

    .header p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
      margin: 0 0 16px 0;
      font-weight: 400;
    }

    /* Блок соцсетей перенесен под описание */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 10px;
    }

    .social-icon {
      color: rgba(255, 255, 255, 0.8);
      font-size: 24px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .social-icon:hover {
      transform: translateY(-4px) scale(1.15);
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.5);
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Карточки под светлое полупрозрачное стекло Nothing */
    .card {
      text-decoration: none;
      color: #1c1c1e;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                  box-shadow 0.4s ease, 
                  background 0.3s ease;
      cursor: pointer;
      animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
    }

    .image-container {
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #eaeaea;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }

    .card:hover .card-img {
      transform: scale(1.03);
    }

    .card-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-title {
      font-weight: 700;
      font-size: 20px;
      color: #000000;
    }

    .card-description {
      font-size: 14px;
      color: #48484a;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .card-price {
      font-weight: 700;
      font-size: 14px;
      color: #000000;
      background: #ffffff;
      padding: 6px 16px;
      border-radius: 30px;
      border: 1px solid #e5e5ea;
      transition: all 0.2s ease;
    }

    .card:hover .card-price {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .card-action {
      font-size: 14px;
      font-weight: 600;
      color: #000000;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s ease;
    }

    .card:hover .card-action {
      gap: 10px;
    }

    @keyframes popUp {
      from { transform: translateY(40px) scale(0.92); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Шапка страницы -->
    <div class="header">
      <!-- Конструкция 3D Pop-Out аватарки -->
      <div class="avatar-wrapper">
        <div class="avatar-bg"></div>
        <div class="avatar-cutout">
          <!-- Сюда вставишь свое PNG фото без фона. Пока стоит тестовый пример из видео-вайба -->
          <img src="https://i.imgur.com/83ZgH4t.png" alt="irrareboy 3D avatar" class="avatar-img">
        </div>
      </div>
      
      <h1>IRRAREBOY</h1>
      <p>just an irrare boy</p>

      <!-- Блок соцсетей прямо под био -->
      <div class="social-links">
        <a href="ССЫЛКА_НА_X" target="_blank" class="social-icon" title="X (Twitter)"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="ССЫЛКА_НА_INSTAGRAM" target="_blank" class="social-icon" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="ССЫЛКА_НА_SNAPCHAT" target="_blank" class="social-icon" title="Snapchat"><i class="fa-brands fa-snapchat"></i></a>
        <a href="ССЫЛКА_НА_TELEGRAM" target="_blank" class="social-icon" title="Telegram"><i class="fa-brands fa-telegram"></i></a>
      </div>
    </div>

    <!-- Сетка с целями -->
    <div class="grid">
      
      <!-- Карточка 1 -->
      <a href="ССЫЛКА_НА_TRIBUTE_1" target="_blank" class="card">
        <div class="image-container">
          <img src="https://images.unsplash.com/photo-1520256866875-9b48b945148c?q=80&w=600&auto=format&fit=crop" alt="Audio Hardware" class="card-img">
        </div>
        <div class="card-content">
          <div class="card-title">Acoustic Layer 🎧</div>
          <div class="card-description">Integrating vintage open-back monitoring architecture with clean, transparent textures for the ultimate desktop soundscape.</div>
          <div class="card-footer">
            <span class="card-price">€150</span>
            <span class="card-action">Order layer &rarr;</span>
          </div>
        </div>
      </a>

    </div>

  </div>

</body>
</html>

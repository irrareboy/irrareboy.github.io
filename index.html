<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IRRAREBOY</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MuseoModerno:wght@400;500;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="desktop-canvas">
    
    <!-- Сайдбар -->
    <aside class="sidebar">
      <!-- Контейнер для манекена (обрезанного по колени) -->
      <div class="mannequin-wrapper">
        <!-- Положи картинку манекена в папку с сайтом под именем mannequin.png -->
        <img src="mannequin.png" alt="Mannequin" class="mannequin-img">
      </div>
      
      <h1 class="brand-title">IRRAREBOY<span class="dot">.</span></h1>
      
      <!-- Верхний ряд 4 маленьких кнопок -->
      <div class="social-row-small">
        <a href="#" class="btn-small"></a>
        <a href="#" class="btn-small"></a>
        <a href="#" class="btn-small"></a>
        <a href="#" class="btn-small"></a>
      </div>

      <!-- Нижний ряд 2 длинных кнопок -->
      <div class="social-row-large">
        <a href="#" class="btn-large"></a>
        <a href="#" class="btn-large"></a>
      </div>
    </aside>

    <!-- Секция скролла -->
    <section class="content-slider" id="slider">
      <div class="cards-grid">
    
        <article class="card">
          <span class="card-title">Design inside</span>
          <span class="card-arrow">↘</span>
        </article>

        <article class="card">
           <span class="card-title">This is type of strochki that need this</span>
          <span class="card-arrow">↘</span>
        </article>

        <article class="card">
          <span class="card-title">Design inside 3</span>
          <span class="card-arrow">↘</span>
        </article>

        <article class="card">
          <span class="card-title">Design inside 4</span>
          <span class="card-arrow">↘</span>
        </article>

        <!-- Новые карточки, которые уходят вправо за экран -->
        <article class="card">
          <span class="card-title">Design inside 5</span>
          <span class="card-arrow">↘</span>
        </article>

        <article class="card">
          <span class="card-title">Design inside 6</span>
          <span class="card-arrow">↘</span>
        </article>

      </div>
    </section>

  </main>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    
    // --- 1. ГОРИЗОНТАЛЬНЫЙ СКРОЛЛ КОЛЕСОМ ---
    const slider = document.querySelector('.content-slider');

    if (slider) {
      slider.addEventListener('wheel', (e) => {
        if (e.deltaY !== 0) {
          e.preventDefault();
          slider.scrollBy({
            left: e.deltaY * 1.5,
            behavior: 'auto'
          });
        }
      }, { passive: false });
    }

    // --- 2. АВТО-МАСШТАБИРОВАНИЕ ПОД ВЫСОТУ ЭКРАНА (Full HD + 125% scale) ---
    function fitCanvasToScreen() {
      const canvas = document.querySelector('.desktop-canvas');
      if (!canvas) return;

      const targetWidth = 1440;
      const targetHeight = 1024;

      const currentWidth = window.innerWidth;
      const currentHeight = window.innerHeight;

      // Если экран достаточно широкий для десктопа (>= 900px), но по высоте не влезает макет 1024px
      if (currentWidth >= 900 && currentHeight < targetHeight) {
        // Считаем коэффициент сжатия строго по высоте
        const scale = currentHeight / targetHeight;
        canvas.style.transform = `scale(${scale})`;
        canvas.style.transformOrigin = 'top center'; // ВАЖНО: масштабируем строго из центра!
      } else {
        canvas.style.transform = 'none';
      }
    }

    // Запускаем расчёт масштаба при загрузке и изменении размеров окна
    fitCanvasToScreen();
    window.addEventListener('resize', fitCanvasToScreen);

  });
</script>
  
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>IRRAREBOY</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <main class="desktop-canvas">

        <a href="#" class="btn-small"></a>
        <a href="#" class="btn-small"></a>

    <!-- Секция скролла -->
